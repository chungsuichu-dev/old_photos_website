<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" href="/static/favicon.png">
		<title>Old Photos Connect</title>
		%sveltekit.head%

		<style>
    		@font-face {
        		font-family: 'GoudyBookletter1911';
        		src: url('/fonts/GoudyBookletter1911.ttf') format('truetype');
        		font-weight: normal;
        		font-style: normal;
    		}

			html::-webkit-scrollbar {
    			display: none; /* Chrome / Edge */
			}

    		html, body {
        		margin: 0;
        		padding: 0;
        		height: 100%;

    		}

			.sveltekit-body {
    			display: contents;
			}

		</style>

	</head>
	<body data-sveltekit-preload-data="hover">
		<div class="sveltekit-body">%sveltekit.body%</div>
	</body>
</html>
